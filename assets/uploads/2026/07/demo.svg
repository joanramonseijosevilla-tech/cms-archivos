<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Imagen de ejemplo Nexautia</title>
  <desc id="desc">Fondo azul oscuro abstracto para una publicación de ejemplo.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.54" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="r" cx="30%" cy="20%" r="70%">
      <stop offset="0" stop-color="#60a5fa" stop-opacity=".35"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#g)"/>
  <rect width="1200" height="900" fill="url(#r)"/>
  <circle cx="240" cy="190" r="190" fill="#2563eb" opacity=".24"/>
  <circle cx="1030" cy="770" r="260" fill="#60a5fa" opacity=".15"/>
  <rect x="190" y="260" width="820" height="370" rx="44" fill="#ffffff" opacity=".10" stroke="#ffffff" stroke-opacity=".22"/>
  <text x="600" y="415" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="72" font-weight="700">Mini CMS</text>
  <text x="600" y="498" text-anchor="middle" fill="#dbeafe" font-family="Arial, sans-serif" font-size="34">GitHub Pages + JSON + Make</text>
  <text x="600" y="560" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="26" font-weight="700">Nexautia</text>
